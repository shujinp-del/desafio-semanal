<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🔥 Desafio Semanal 🔥</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>🔥 Desafio Semanal 🔥</h1>

    <input
      type="text"
      id="nome"
      placeholder="Nome do motorista"
    >

    <input
      type="number"
      id="valor"
      placeholder="Valor do dia"
    >

    <input
      type="number"
      id="corridas"
      placeholder="Corridas do dia"
    >

    <select id="dia">
      <input type="date" id="data">

      <option value="Segunda">
        Segunda
      </option>

      <option value="Terça">
        Terça
      </option>

      <option value="Quarta">
        Quarta
      </option>

      <option value="Quinta">
        Quinta
      </option>

      <option value="Sexta">
        Sexta
      </option>

      <option value="Sábado">
        Sábado
      </option>

      <option value="Domingo">
        Domingo
      </option>

    </select>

    <button onclick="adicionar()">

      Adicionar

    </button>

    <br><br>

    <div id="liderSemana"></div>

    <h2>📊 Ranking Semanal</h2>

    <canvas id="grafico"></canvas>

    <ul id="ranking"></ul>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="script.js"></script>

</body>

</html>
