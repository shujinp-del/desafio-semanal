<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Desafio Semanal</title>

  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color"
        content="#ff7a18">

</head>

<body>

  <div class="app">

    <!-- HOME -->

    <section id="home"
             class="tela ativa">

      <h1>🔥 Desafio Semanal</h1>

      <p class="subtitulo">

        Registre suas corridas e suba no ranking

      </p>

      <div id="liderSemana"></div>

      <div class="card">

        <h2>Adicionar corrida</h2>

        <input id="nome"
               placeholder="Nome do motorista">

        <input id="valor"
               type="number"
               placeholder="Valor R$">

        <input id="corridas"
               type="number"
               placeholder="Número de corridas">

        <select id="dia">

          <option>Segunda</option>
          <option>Terça</option>
          <option>Quarta</option>
          <option>Quinta</option>
          <option>Sexta</option>
          <option>Sábado</option>
          <option>Domingo</option>

        </select>

        <input type="date"
               id="data">

        <button onclick="adicionar()">

          Adicionar

        </button>

        <button class="secundario"
                onclick="resetSemana()">

          Resetar Semana

        </button>

      </div>

    </section>

    <!-- RANKING -->

    <section id="rankingTela"
             class="tela">

      <h1>🏆 Ranking</h1>

      <ul id="ranking"></ul>

    </section>

    <!-- GRAFICO -->

    <section id="graficoTela"
             class="tela">

      <h1>📊 Gráfico</h1>

      <div class="card">

        <canvas id="grafico"></canvas>

      </div>

      <div class="metricas">

        <div>

          <small>Total Semana</small>

          <strong id="totalSemana">

            R$ 0

          </strong>

        </div>

        <div>

          <small>Total Corridas</small>

          <strong id="totalCorridas">

            0

          </strong>

        </div>

      </div>

    </section>

    <!-- MENU -->

    <nav class="menu">

      <button onclick="abrirTela('home')">

        🏠

        <span>Home</span>

      </button>

      <button onclick="abrirTela('rankingTela')">

        🏆

        <span>Ranking</span>

      </button>

      <button onclick="abrirTela('graficoTela')">

        📊

        <span>Gráfico</span>

      </button>

    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="script.js"></script>

</body>

</html>
