<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio Semanal</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7a18">
</head>

<body>

  <div class="app">

    <section id="home" class="tela ativa">

      <h1>🔥 Desafio</h1>
      <p class="subtitulo">Painel de ganhos dos motoristas</p>

      <div class="dashboard-cards">

        <div class="mini-card">
          <small>Total Semana</small>
          <strong id="homeTotal">R$ 0</strong>
        </div>

        <div class="mini-card">
          <small>Total Mês</small>
          <strong id="homeMensal">R$ 0</strong>
        </div>

      </div>

      <div id="liderSemana"></div>

      <div class="card">

        <h2>Nova corrida</h2>

        <button onclick="testarFirebase()">
          🔥 Testar Firebase
        </button>

        <input id="nome" placeholder="Nome do motorista">

        <input id="valor" type="number" placeholder="Valor R$">

        <input id="corridas" type="number" placeholder="Número de corridas">

        <input type="date" id="data">

        <button onclick="adicionar()">
          Adicionar corrida
        </button>

        <button class="secundario" onclick="resetSemana()">
          Resetar tudo
        </button>

      </div>

    </section>

    <section id="rankingTela" class="tela">

      <h1>🏆 Ranking</h1>
      <p class="subtitulo">Classificação geral</p>

      <ul id="ranking"></ul>

    </section>

    <section id="graficoTela" class="tela">

      <h1>📊 Gráfico</h1>
      <p class="subtitulo">Participação de cada motorista</p>

      <div class="card">
        <canvas id="grafico"></canvas>
      </div>

      <div class="card">

        <h2>📈 Evolução por data</h2>

        <canvas id="graficoLinha"></canvas>

      </div>

      <div class="metricas">

        <div>
          <small>Total Semana</small>
          <strong id="totalSemana">R$ 0</strong>
        </div>

        <div>
          <small>Total Corridas</small>
          <strong id="totalCorridas">0</strong>
        </div>

      </div>

    </section>

    <nav class="menu">

      <button onclick="abrirTela('home')">
        🏠
        <span>Home</span>
      </button>

      <button onclick="abrirTela('rankingTela')">
        🏆
        <span>Ranking</span>
      </button>

      <button onclick="abrirTela('graficoTela')">
        📊
        <span>Gráfico</span>
      </button>

    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrfxwL7BCUQSInVnP7Mx4jnmhNFazABfE",
      authDomain: "desafio-semanal.firebaseapp.com",
      projectId: "desafio-semanal",
      storageBucket: "desafio-semanal.firebasestorage.app",
      messagingSenderId: "948247090731",
      appId: "1:948247090731:web:fb36df17768ce636f07c6e"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    window.testarFirebase = async function () {
      window.db = db
window.collection = collection
window.addDoc = addDoc

      try {

        await addDoc(collection(db, "corridas"), {
          teste: "corrida enviada pelo app",
          criadoEm: new Date().toISOString()
        });

        alert("🔥 Firebase funcionando!");

      } catch (erro) {

        console.error(erro);

        alert("❌ Erro Firebase");
      }
    };

    console.log("🔥 Firebase conectado!");

  </script>

<script type="module" src="script.js"></script>

</body>

</html>
